aid: spellbook
name: Spellbook
description: >-
  Spellbook (spellbook.com) is a generative AI platform for commercial
  lawyers that lives inside Microsoft Word as an add-in. Its product suite
  includes Review (redlining and risk identification), Draft (clause and
  document generation from precedents), Ask (cited answers to contract
  questions), Market (benchmarking contracts against market data), and
  Associate (multi-document workflow agents). Spellbook is used by
  4,500+ in-house teams and law firms across 80+ countries and has
  processed over 10 million contracts. The product is sold as per-seat
  SaaS via direct sales and a 7-day free trial; Spellbook does not
  currently publish a public developer API.
